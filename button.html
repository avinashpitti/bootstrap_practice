<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="bootstrap-5.1.3-dist/css/bootstrap.min.css">
    <title>Button component</title>
</head>
<body>
    <button class="btn btn-primary p-2 m-2">Click Me!</button>
    <button class="btn btn-secondary mx-2">Second</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-info">Info</button>
    <button class="btn btn-light">light</button>
    <button class="btn btn-dark">dark</button>

    <!-- only border+text color, no background -->
    <button class="btn btn-outline-primary">outline primary</button>
    <button class="btn btn-outline-secondary">outline secondary</button>
    <button class="btn btn-outline-danger">outline danger</button>
    <button class="btn btn-outline-info">outline info</button>
    <button class="btn btn-outline-light">outline light</button>
    <button class="btn btn-outline-dark">outline dark</button>
    <button class="btn btn-outline-success">outline Success</button>

    <!-- button sizes -->
     <button class="btn btn-primary btn-lg my-2">large</button>
     <button class="btn btn-primary btn-sm">small</button>

    <!-- block button -->
      <button class="btn btn-primary w-100">Full width</button>

    <!-- disabled button : it just exists,but we can't do anything with it -->
       <button class="btn btn-primary disabled mt-3">disabled</button>

    <!-- button with link -->
     <a href="grid.html" target="_blank" class="btn btn-success">Go to Grid page</a>

     <div class="btn-group ">
        <button class="btn btn-primary m-2 ">Left</button>
        <button class="btn btn-primary m-2 ">Middle</button>
        <button class="btn btn-primary m-2 ">Right</button>
     </div>


     <!-- mini project -->
    
     <div class="container">
        <button class="btn btn-success">Save</button>
        <button class="btn btn-danger">Delete</button>
        <button class="btn btn-warning">Edit</button>
     </div>

     <div class="container m-3">
        <button class="btn btn-primary">Login</button>
        <button class="btn btn-success">Register</button>
        <button class="btn btn-danger">Cancel</button>
     </div>
</body>
</html>
