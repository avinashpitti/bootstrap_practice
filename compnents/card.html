<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Container</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>

</head>
<body>
    <div class="container mt-4 bg-secondary">
  <div class="row">

    <!-- Card 1 -->
    <div class="col-md-4">
      <div class="card" style="width: 18rem;">
        <img src="dog-image.webp" class="card-img-top">
        <div class="card-body text-center text-white bg-dark">
          <h5 class="card-title">Dog</h5>
          <p class="card-text">Rs.999/- only</p>
          <button class="btn btn-success">Add To Cart</button>
        </div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="col-md-4">
      <div class="card" style="width: 18rem;">
        <img src="cat-image.webp" class="card-img-top">
        <div class="card-body text-center text-white bg-dark">
          <h5 class="card-title">Cat</h5>
          <p class="card-text">Rs.1499/- only</p>
          <button class="btn btn-success">Add To Cart</button>
        </div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="col-md-4">
      <div class="card" style="width: 18rem;">
        <img src="parrot-img.webp" class="card-img-top">
        <div class="card-body text-white text-center bg-dark">
          <h5 class="card-title">Parrot</h5>
          <p class="card-text">Rs.499/- only</p>
          <button class="btn btn-success">Add To Cart</button>
        </div>
      </div>
    </div>

  </div>
</div>
</body>
</html>
